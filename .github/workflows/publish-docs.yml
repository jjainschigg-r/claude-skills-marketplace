name: Publish to web server

on:
  workflow_call:
    secrets:
      DOCS_SSH_KEY:
        required: true
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Rsync to web server
        env:
          DOCS_SSH_KEY_ED25519: ${{ secrets.DOCS_SSH_KEY }}
          DOCS_ROOT: '/var/www/claude-skills/'
          DOCS_USER: 'k0rdent-docs'
          DOCS_HOST: '54.82.205.222'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y rsync
          mkdir -p ~/.ssh/
          echo "$DOCS_SSH_KEY_ED25519" | base64 -di > ~/.ssh/id_rsa_ed25519
          chmod 600 ~/.ssh/id_rsa_ed25519
          SSH_OPTS=(-o "StrictHostKeyChecking=no" -o "UserKnownHostsFile=/dev/null")
          rsync -rv --delete \
            -e "ssh ${SSH_OPTS[*]} -i ~/.ssh/id_rsa_ed25519" \
            ./ "${DOCS_USER}@${DOCS_HOST}:${DOCS_ROOT}"
